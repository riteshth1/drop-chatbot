<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drop Support</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Inter', -apple-system, sans-serif; 
      /* Modern dynamic gradient background */
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      color: #f8fafc;
      overflow: hidden;
    }
    
    /* Background decorative blobs */
    .blob {
      position: absolute;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.6;
    }
    .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #4f46e5; border-radius: 50%; }
    .blob-2 { bottom: -10%; right: -10%; width: 50vw; height: 50vw; background: #ec4899; border-radius: 50%; }

    .chat-box { 
      width: 100%;
      max-width: 420px; 
      height: 85vh;
      max-height: 800px;
      /* Glassmorphism */
      background: rgba(255, 255, 255, 0.05); 
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px; 
      display: flex; 
      flex-direction: column; 
      overflow: hidden; 
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
      animation: floatIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes floatIn {
      0% { opacity: 0; transform: translateY(40px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .header { 
      padding: 24px 20px; 
      background: rgba(255, 255, 255, 0.03); 
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-weight: 600; 
      font-size: 18px; 
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .header-icon-img {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
    }
    
    .header-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }
    
    .header-title {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.3px;
    }
    
    .header-status {
        font-size: 12px;
        color: #94a3b8;
        display: flex;
        align-items: center;
        gap: 4px;
        font-weight: 500;
    }
    
    .status-dot {
        width: 6px;
        height: 6px;
        background: #10b981;
        border-radius: 50%;
        box-shadow: 0 0 8px #10b981;
    }

    .messages { 
      flex: 1; 
      overflow-y: auto; 
      padding: 24px 20px; 
      display: flex; 
      flex-direction: column; 
      gap: 16px; 
      scroll-behavior: smooth;
    }
    
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    
    .msg { 
      max-width: 85%; 
      padding: 14px 18px; 
      border-radius: 20px; 
      font-size: 15px; 
      line-height: 1.6; 
      word-wrap: break-word;
      animation: msgPop 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(10px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    
    @keyframes msgPop {
      to { opacity: 1; transform: translateY(0); }
    }
    
    .user { 
      background: linear-gradient(135deg, #6366f1, #8b5cf6); 
      color: white; 
      align-self: flex-end; 
      border-bottom-right-radius: 4px; 
    }
    
    .assistant { 
      background: rgba(255, 255, 255, 0.1); 
      color: #f1f5f9; 
      align-self: flex-start; 
      border-bottom-left-radius: 4px; 
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .chips-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 20px 16px 20px;
      transition: all 0.3s ease;
    }
    
    .chip {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #e2e8f0;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .chip:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .input-row { 
      display: flex; 
      padding: 16px 20px 20px 20px; 
      background: rgba(255, 255, 255, 0.03);
      border-top: 1px solid rgba(255, 255, 255, 0.08); 
      gap: 12px; 
      align-items: center;
    }
    
    .input-wrapper {
        flex: 1;
        position: relative;
        display: flex;
        align-items: center;
    }

    input { 
      width: 100%;
      padding: 14px 20px; 
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1); 
      color: white;
      border-radius: 24px; 
      font-size: 15px; 
      font-family: inherit;
      outline: none; 
      transition: all 0.3s ease;
    }
    
    input::placeholder {
        color: #94a3b8;
    }
    
    input:focus {
      background: rgba(0, 0, 0, 0.3);
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }
    
    button.send-btn { 
      display: flex;
      align-items: center;
      justify-content: center;
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6); 
      color: white; 
      border: none; 
      border-radius: 50%; 
      cursor: pointer; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      flex-shrink: 0;
    }
    
    button.send-btn:hover { 
      transform: scale(1.05);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
    }
    
    button.send-btn:active {
      transform: scale(0.95);
    }
    
    button.send-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      margin-left: 2px;
    }
    
    .typing { 
      font-size: 14px; 
      display: flex;
      align-items: center;
      gap: 5px;
      background: transparent !important;
      border: none !important;
      padding: 8px 16px;
      box-shadow: none;
    }
    
    .dot-typing {
      display: flex;
      gap: 4px;
      padding: 8px 4px;
    }
    .dot-typing span {
      width: 6px;
      height: 6px;
      background-color: #a78bfa;
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out both;
    }
    .dot-typing span:nth-child(1) { animation-delay: -0.32s; }
    .dot-typing span:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes typing {
      0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
      40% { transform: scale(1.1); opacity: 1; }
    }
    
    /* Markdown Styles */
    .msg p, .msg ul, .msg ol {
      margin-bottom: 8px;
    }
    .msg p:last-child, .msg ul:last-child, .msg ol:last-child {
      margin-bottom: 0;
    }
    .msg ul, .msg ol {
      padding-left: 20px;
    }
    .msg li {
      margin-bottom: 4px;
    }
    .msg strong {
      font-weight: 600;
    }

    /* Image Display Styles */
    .image-row {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      margin-top: 12px;
      padding-bottom: 4px;
    }
    
    .image-row::-webkit-scrollbar { height: 6px; }
    .image-row::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    
    .bot-image {
      max-height: 180px;
      border-radius: 12px;
      border: 1px solid #eee;
      cursor: pointer;
      object-fit: contain;
    }

    .drop-link-btn {
      display: inline-block;
      text-decoration: none;
      background: #7F77DD;
      color: white;
      border-radius: 24px;
      padding: 8px 16px;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }
    
    .drop-link-btn:hover {
      background: #6a62c7;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="chat-box">
  <div class="header">
    <img src="static/assets/logo.png" alt="Drop Logo" class="header-icon-img" />
    <div class="header-info">
      <div class="header-title">Drop Support</div>
      <div class="header-status">
        <span class="status-dot"></span> Online
      </div>
    </div>
  </div>
  
  <div class="messages" id="messages">
    <div class="msg assistant">Hi! I'm the Drop support assistant. Ask me anything about Droplets, Hub, Explore, Pair, or Memo! How can I help you today?</div>
  </div>
  
  <div class="chips-container" id="starter-chips">
    <button class="chip" onclick="sendChipMessage('What is a Droplet?')">What is a Droplet?</button>
    <button class="chip" onclick="sendChipMessage('How does Hub work?')">How does Hub work?</button>
    <button class="chip" onclick="sendChipMessage('What is Explore?')">What is Explore?</button>
    <button class="chip" onclick="sendChipMessage('How do Coins work?')">How do Coins work?</button>
  </div>

  <div class="input-row">
    <div class="input-wrapper">
      <input type="text" id="input" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMessage()" autocomplete="off" />
    </div>
    <button class="send-btn" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
    </button>
  </div>
</div>

<script>
  let sessionId = null;
  const BACKEND_URL = window.location.origin;

  function sendChipMessage(text) {
    const input = document.getElementById("input");
    input.value = text;
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById("input");
    const message = input.value.trim();
    if (!message) return;

    // Remove chips after first interaction
    const chipsContainer = document.getElementById("starter-chips");
    if (chipsContainer) {
      chipsContainer.style.opacity = '0';
      chipsContainer.style.transform = 'translateY(10px)';
      chipsContainer.style.pointerEvents = 'none';
      setTimeout(() => chipsContainer.style.display = 'none', 300);
    }

    appendMessage("user", message);
    input.value = "";
    
    showTypingIndicator();

    try {
      const payload = { message };
      if (sessionId) payload.session_id = sessionId;
      
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      sessionId = data.session_id;

      removeTypingIndicator();
      appendBotResponse(data.response, data.images, data.link);
    } catch (err) {
      console.error(err);
      removeTypingIndicator();
      appendBotResponse("Sorry, I couldn't connect to the server. Please try again later.", [], null);
    }
  }

  function appendMessage(role, content) {
    const box = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    if (role === 'assistant' && typeof marked !== 'undefined') {
      div.innerHTML = marked.parse(content);
    } else {
      div.textContent = content; // Keep user messages as plain text for safety
    }
    box.appendChild(div);
    scrollToBottom();
  }

  function appendBotResponse(text, images, link) {
    const box = document.getElementById("messages");
    const containerDiv = document.createElement("div");
    containerDiv.className = "msg assistant";
    
    // Text content
    const textDiv = document.createElement("div");
    if (typeof marked !== 'undefined') {
      textDiv.innerHTML = marked.parse(text);
    } else {
      textDiv.textContent = text;
    }
    containerDiv.appendChild(textDiv);
    
    // Images
    if (images && images.length > 0) {
      const imgRow = document.createElement("div");
      imgRow.className = "image-row";
      images.forEach(imgUrl => {
        const a = document.createElement("a");
        a.href = imgUrl;
        a.target = "_blank";
        
        const img = document.createElement("img");
        img.src = imgUrl;
        img.className = "bot-image";
        img.alt = "Support Image";
        
        a.appendChild(img);
        imgRow.appendChild(a);
      });
      containerDiv.appendChild(imgRow);
    }
    
    // Link button
    if (link) {
      const linkBtn = document.createElement("a");
      linkBtn.href = link;
      linkBtn.target = "_blank";
      linkBtn.className = "drop-link-btn";
      linkBtn.textContent = "View in Drop App →";
      
      const linkContainer = document.createElement("div");
      linkContainer.appendChild(linkBtn);
      containerDiv.appendChild(linkContainer);
    }
    
    box.appendChild(containerDiv);
    scrollToBottom();
  }

  function showTypingIndicator() {
    const box = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "msg assistant typing";
    div.id = "typing-indicator";
    
    const dots = document.createElement("div");
    dots.className = "dot-typing";
    dots.innerHTML = "<span></span><span></span><span></span>";
    
    div.appendChild(dots);
    box.appendChild(div);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    const t = document.getElementById("typing-indicator");
    if (t) t.remove();
  }
  
  function scrollToBottom() {
    const box = document.getElementById("messages");
    box.scrollTop = box.scrollHeight;
  }
</script>
</body>
</html>
